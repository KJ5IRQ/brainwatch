name: Bug report
description: Report a reproducible Brainwatch defect
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Remove credentials, live provider responses, and private paths before submitting.
  - type: input
    id: version
    attributes:
      label: Brainwatch version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform and Python version
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction using synthetic data
      description: Include the command, sanitized configuration shape, and exact steps.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: hygiene
    attributes:
      label: Safety check
      options:
        - label: I removed credentials, live evidence, and machine-specific identifiers.
          required: true
